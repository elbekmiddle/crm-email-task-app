services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-task-app
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/crm_tasks
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: crm-task-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: crm-task-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
